<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Предсказания</title>
    <link rel="stylesheet" type="text/css" href="/CSS/styles-dragon.css" />
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Baloo+2:wght@700&display=swap" rel="stylesheet">
</head>
<body>
<div class="background">


    <div id="dragonPage">
        <div class="characterDisplay">
            <img id="selectedCharacterImg" src="img/CharacterDragon.jpg" alt="Персонаж">            
        </div>
        <div class="speechBubble" id="predictionPhrase">Привет! Скажи, что хочешь знать и я дам тебе предсказание</div>
        <div class="buttonsOracle">
            <button id="buttonOracle">Получить предсказание</button>
            <button id="backButton">← Выбрать другого персонажа</button>
        </div>
    </div>
</div>
<div id="ray1" class="ray"></div>
<div id="ray2" class="ray"></div>
<div id="ray3" class="ray"></div>
<script src="js/dragon.js"></script>
</body>
</html>
